name: Otterotter Telegram pipeline

on:
  schedule:
    - cron: "0 6 * * *"   # once a day at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Fetch new Telegram posts and extract events
        working-directory: pipeline
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_GROUP: ${{ secrets.TG_GROUP }}
          TG_TOPIC: ${{ secrets.TG_TOPIC }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python fetch_and_extract.py
      - name: Publish approved events to the map
        working-directory: pipeline
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python sync_approved.py
      - name: Commit any updates
        run: |
          git config user.name "otterotter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/events.json pipeline/state.json pipeline/geocode_cache.json || true
          git diff --staged --quiet || git commit -m "Update events from Telegram pipeline"
          git push || true
