<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Otterotter — Road-trip planner (beta)</title>
<meta name="description" content="Experimental tool: plan a driveable route between contact improvisation & eco-somatic festivals." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/styles.css" />
<style>
  body { height: 100vh; display: flex; flex-direction: column; }
  .rt-header {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    flex-wrap: wrap; padding: 14px 26px; background: rgba(251,246,238,0.82);
    backdrop-filter: blur(12px); border-bottom: 1px solid var(--line);
  }
  .rt-header h1 { margin: 0; font-family: var(--font-display); font-style: italic; font-weight: 600;
    font-size: 22px; color: var(--forest); }
  .rt-beta { font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
    background: rgba(106,90,134,.14); color: var(--dusk); padding: 3px 9px; border-radius: 999px; margin-left: 8px; }
  .rt-back { font-weight: 700; color: var(--moss); text-decoration: none; }
  .rt-back:hover { color: var(--forest); }
  .rt-main { display: grid; grid-template-columns: 420px 1fr; flex: 1; min-height: 0; }
  .rt-panel { overflow-y: auto; padding: 18px 22px; border-right: 1px solid var(--line); }
  #map { height: 100%; }
  .rt-intro { color: var(--muted); font-size: 13.5px; margin: 0 0 14px; line-height: 1.55; }
  #event-list { padding: 0; }
  @media (max-width: 860px) { .rt-main { grid-template-columns: 1fr; } #map { height: 50vh; } }
</style>
</head>
<body>
  <header class="rt-header">
    <h1>🦦 Road-trip planner <span class="rt-beta">beta</span></h1>
    <a class="rt-back" href="/">← Back to the map</a>
  </header>
  <div class="rt-main">
    <div class="rt-panel">
      <p class="rt-intro">An experimental toy: pick where you're starting and ending, your dates, and it
        strings together festivals you could <b>drive</b> between — in order, without backtracking or
        crossing water. Rough edges expected!</p>
      <div class="trip-panel" style="margin:0 0 14px;padding:14px 16px;">
        <div class="trip-fields">
          <label class="trip-field">Start<input id="trip-start" type="text" placeholder="City, country" /></label>
          <label class="trip-field">End<input id="trip-end" type="text" placeholder="City, country (or same)" /></label>
          <label class="trip-field">From<input id="trip-from" type="date" /></label>
          <label class="trip-field">To<input id="trip-to" type="date" /></label>
          <label class="trip-field">Detour
            <select id="trip-corridor">
              <option value="300">Fairly direct (300 km)</option>
              <option value="700" selected>Relaxed (700 km)</option>
              <option value="1500">Very wide (1500 km)</option>
            </select>
          </label>
          <label class="trip-field">Head (loops)
            <select id="trip-dir">
              <option value="">Any direction</option>
              <option value="0">North</option><option value="90">East</option>
              <option value="180">South</option><option value="270">West</option>
            </select>
          </label>
          <button id="trip-plan" class="btn-primary" type="button">Plan trip</button>
        </div>
        <p class="trip-status" id="trip-status"></p>
      </div>
      <div id="result-count" style="display:none"></div>
      <aside id="event-list"></aside>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  (function () {
    "use strict";
    var allEvents = [], map, tripLayer = null, baseLayer = null;
    var TYPE_LABELS = { jam:"Jam", class:"Class", workshop:"Workshop", festival:"Festival", retreat:"Retreat" };

    function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function safeUrl(u){ if(!u) return ""; var s=String(u).trim(); return (/^https?:\/\//i.test(s)||/^mailto:/i.test(s))?s:""; }
    function parseDate(str){ var p=(str||"").split("-"); return p.length===3?new Date(+p[0],+p[1]-1,+p[2]):null; }
    function daysBetween(a,b){ var pa=parseDate(a),pb=parseDate(b); return (pa&&pb)?Math.round((pb-pa)/86400000):0; }
    function fmtRange(ev){ var o={day:"numeric",month:"short"}, s=parseDate(ev.start_date), e=parseDate(ev.end_date);
      if(!s) return ""; var t=s.toLocaleDateString("en-GB",o);
      if(e&&ev.end_date!==ev.start_date) t+=" – "+e.toLocaleDateString("en-GB",o);
      if(ev.time&&ev.time!=="all day") t+=" · "+ev.time; return t; }
    function isLocated(ev){ return typeof ev.lat==="number"&&isFinite(ev.lat)&&typeof ev.lng==="number"&&isFinite(ev.lng); }

    function haversineKm(aLat,aLng,bLat,bLng){ var R=6371,r=Math.PI/180,dLa=(bLat-aLat)*r,dLn=(bLng-aLng)*r;
      var s=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(aLat*r)*Math.cos(bLat*r)*Math.sin(dLn/2)*Math.sin(dLn/2);
      return 2*R*Math.asin(Math.sqrt(s)); }
    function segDistKm(pLat,pLng,aLat,aLng,bLat,bLng){ var rl=((aLat+bLat)/2)*Math.PI/180, kx=111.32*Math.cos(rl), ky=110.57;
      var ax=aLng*kx,ay=aLat*ky,bx=bLng*kx,by=bLat*ky,px=pLng*kx,py=pLat*ky,dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
      var t=l2?((px-ax)*dx+(py-ay)*dy)/l2:0; t=Math.max(0,Math.min(1,t)); var cx=ax+t*dx,cy=ay+t*dy;
      return Math.sqrt((px-cx)*(px-cx)+(py-cy)*(py-cy)); }
    function bearingDeg(aLat,aLng,bLat,bLng){ var r=Math.PI/180, y=Math.sin((bLng-aLng)*r)*Math.cos(bLat*r);
      var x=Math.cos(aLat*r)*Math.sin(bLat*r)-Math.sin(aLat*r)*Math.cos(bLat*r)*Math.cos((bLng-aLng)*r);
      return (Math.atan2(y,x)*180/Math.PI+360)%360; }
    function destPoint(lat,lng,d,brg){ var R=6371,r=Math.PI/180,br=brg*r,la1=lat*r,lo1=lng*r,dr=d/R;
      var la2=Math.asin(Math.sin(la1)*Math.cos(dr)+Math.cos(la1)*Math.sin(dr)*Math.cos(br));
      var lo2=lo1+Math.atan2(Math.sin(br)*Math.sin(dr)*Math.cos(la1),Math.cos(dr)-Math.sin(la1)*Math.sin(la2));
      return [la2/r,((lo2/r)+540)%360-180]; }
    function orient(a,b,c){ return (b[1]-a[1])*(c[0]-a[0])-(b[0]-a[0])*(c[1]-a[1]); }
    function properCross(p1,p2,p3,p4){ var d1=orient(p3,p4,p1),d2=orient(p3,p4,p2),d3=orient(p1,p2,p3),d4=orient(p1,p2,p4);
      if(d1===0||d2===0||d3===0||d4===0) return false; return ((d1>0)!==(d2>0))&&((d3>0)!==(d4>0)); }
    function travelDaysFor(km){ return km>700?2:1; }
    function formatDur(min){ if(min==null) return ""; var h=Math.floor(min/60),m=Math.round(min%60); return h?(h+"h"+(m?" "+m+"m":"")):(m+"m"); }

    function geocodePlace(q){ return fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(q))
      .then(function(r){return r.json();}).then(function(h){ if(h&&h[0]) return [parseFloat(h[0].lat),parseFloat(h[0].lon)]; throw new Error("nf"); }); }
    function routeLeg(a,b){ return fetch("/.netlify/functions/route?from="+a[1]+","+a[0]+"&to="+b[1]+","+b[0])
      .then(function(r){ if(!r.ok) throw 0; return r.json(); }).catch(function(){ return {unavailable:true}; }); }

    function buildItinerary(cands,start,end){
      var out=[],legs=[],prevPt=start,prev=null;
      for(var i=0;i<cands.length;i++){ var ev=cands[i],pt=[ev.lat,ev.lng];
        if(prev){ var km=haversineKm(prev.lat,prev.lng,ev.lat,ev.lng); if(daysBetween(prev.end_date||prev.start_date,ev.start_date)<travelDaysFor(km)+1) continue; }
        var cr=false; for(var j=0;j<legs.length-1;j++){ if(properCross(prevPt,pt,legs[j][0],legs[j][1])){cr=true;break;} }
        if(cr) continue; out.push(ev); legs.push([prevPt,pt]); prevPt=pt; prev=ev; }
      while(out.length){ var bad=false; for(var k=0;k<legs.length-1;k++){ if(properCross(legs[legs.length-1][1],end,legs[k][0],legs[k][1])){bad=true;break;} } if(!bad) break; out.pop(); legs.pop(); }
      return out;
    }
    function validateDriveable(start,end,stops,done){
      var out=[],prev=start,i=0;
      (function step(){ if(i>=stops.length){ routeLeg(prev,end).then(function(el){done(out,el);}); return; }
        var s=stops[i++]; routeLeg(prev,[s.lat,s.lng]).then(function(leg){
          if(leg&&leg.ok){
            var crow=haversineKm(prev[0],prev[1],s.lat,s.lng);
            // skip stops whose DRIVING distance is a big detour vs the straight line
            // (e.g. a sea crossing that the roads have to go all the way around)
            if(leg.km > crow*1.7 && (leg.km-crow) > 150){ step(); return; }
            s._km=Math.round(leg.km); s._min=Math.round(leg.min); out.push(s); prev=[s.lat,s.lng];
          }
          else if(leg&&leg.unavailable){ s._km=Math.round(haversineKm(prev[0],prev[1],s.lat,s.lng)); s._min=null; out.push(s); prev=[s.lat,s.lng]; }
          step(); }); })();
    }

    function planTrip(){
      var sQ=val("trip-start"), eQ=val("trip-end")||val("trip-start"), fD=val("trip-from"), tD=val("trip-to");
      var corr=+val("trip-corridor"), dir=val("trip-dir"), st=document.getElementById("trip-status");
      if(!sQ||!fD||!tD){ st.textContent="Please fill in start, from and to."; return; }
      if(fD>tD){ st.textContent="‘From’ is after ‘To’."; return; }
      st.textContent="Finding your route…";
      Promise.all([geocodePlace(sQ),geocodePlace(eQ)]).then(function(res){
        var start=res[0],end=res[1], isLoop=haversineKm(start[0],start[1],end[0],end[1])<30;
        // for a loop with a chosen heading, aim the corridor at a virtual point in that
        // direction (a forgiving strip) rather than a hard half-plane sector
        var corrEnd=(isLoop&&dir!=="")?destPoint(start[0],start[1],900,+dir):end;
        var cands=allEvents.filter(function(ev){ if(!isLocated(ev)) return false;
          var s=ev.start_date,e=ev.end_date||ev.start_date;
          if(s<fD||s>tD) return false; if(daysBetween(e,tD)<1) return false;
          if(segDistKm(ev.lat,ev.lng,start[0],start[1],corrEnd[0],corrEnd[1])>corr) return false;
          return true; }).sort(function(a,b){ return a.start_date<b.start_date?-1:(a.start_date>b.start_date?1:0); });
        var geo=buildItinerary(cands,start,end);
        st.textContent="Checking driving routes…";
        validateDriveable(start,end,geo,function(stops,endLeg){
          var skipped=cands.length-stops.length;
          var routeIds={}; stops.forEach(function(s){ routeIds[s.id]=true; });
          var winEvents=allEvents.filter(function(ev){ if(!isLocated(ev)) return false; var s=ev.start_date,e=ev.end_date||ev.start_date; return s<=tD&&e>=fD; });
          showBaseEvents(winEvents, routeIds);  // other events in the period stay visible
          drawTrip(start,end,stops,sQ,eQ); renderItinerary(start,end,stops,endLeg);
          st.textContent=stops.length?(stops.length+" festival"+(stops.length>1?"s":"")+" you can drive in sequence"+(skipped>0?" · "+skipped+" more nearby didn't fit (timing, route or backtracking)":"")):"No festivals fit a drivable schedule here — try a wider detour or longer window.";
        });
      }).catch(function(){ st.textContent="Couldn't find one of those places — try ‘City, Country’."; });
    }
    function showBaseEvents(events, excludeIds){
      if(!baseLayer) baseLayer=L.layerGroup().addTo(map);
      baseLayer.clearLayers();
      events.forEach(function(ev){
        if(!isLocated(ev)) return;
        if(excludeIds && excludeIds[ev.id]) return;
        L.circleMarker([ev.lat,ev.lng],{radius:6,color:"#fff",weight:2,fillColor:"#e8742e",fillOpacity:.9})
          .addTo(baseLayer).bindPopup("<b>"+esc(ev.title)+"</b><br>"+esc(fmtRange(ev))+"<br>"+esc([ev.city,ev.country].filter(Boolean).join(", ")));
      });
    }
    function drawTrip(start,end,stops,sN,eN){
      if(tripLayer) map.removeLayer(tripLayer); tripLayer=L.layerGroup().addTo(map);
      var pts=[start].concat(stops.map(function(s){return [s.lat,s.lng];})).concat([end]);
      L.polyline(pts,{color:"#d2613f",weight:3,dashArray:"6 8",opacity:.85}).addTo(tripLayer);
      L.marker(start).addTo(tripLayer).bindPopup("Start: "+esc(sN));
      if(sN!==eN) L.marker(end).addTo(tripLayer).bindPopup("End: "+esc(eN));
      stops.forEach(function(s,i){ var ic=L.divIcon({className:"trip-pin",html:'<div class="trip-num">'+(i+1)+'</div>',iconSize:[26,26],iconAnchor:[13,13]});
        L.marker([s.lat,s.lng],{icon:ic}).addTo(tripLayer).bindPopup("<b>"+esc(s.title)+"</b><br>"+esc(fmtRange(s))); });
      if(pts.length) map.fitBounds(pts,{padding:[40,40]});
    }
    function renderItinerary(start,end,stops,endLeg){
      var list=document.getElementById("event-list");
      if(!stops.length){ list.innerHTML='<div class="empty-state">No drivable festivals on this route in these dates.</div>'; return; }
      var total=0,html="";
      for(var i=0;i<stops.length;i++){ var s=stops[i],km=(s._km!=null)?s._km:0; total+=km;
        var dur=(s._min!=null)?" · ~"+formatDur(s._min)+" drive":"";
        html+='<article class="event-card"><div class="badges"><span class="badge type">Stop '+(i+1)+'</span></div><h3>'+esc(s.title)+'</h3>'+
          '<p class="event-meta">'+esc(fmtRange(s))+' · '+esc([s.city,s.country].filter(Boolean).join(", "))+'</p>'+
          '<p class="event-desc">'+km+' km from '+(i===0?"start":"previous")+dur+'</p>'+
          (safeUrl(s.link)?'<a class="event-link" href="'+esc(safeUrl(s.link))+'" target="_blank" rel="noopener">Event details →</a>':"")+'</article>';
      }
      if(endLeg&&endLeg.ok) total+=Math.round(endLeg.km); else { var ls=stops[stops.length-1]; total+=Math.round(haversineKm(ls.lat,ls.lng,end[0],end[1])); }
      list.innerHTML='<div class="trip-summary">'+stops.length+' stops · ~'+total+' km driving</div>'+html;
    }
    function val(id){ return document.getElementById(id).value.trim(); }

    map=L.map("map").setView([52,12],4);
    L.tileLayer("https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}{r}.png",{maxZoom:18,attribution:'&copy; <a href="https://stadiamaps.com/" target="_blank">Stadia Maps</a> &copy; <a href="https://stamen.com/" target="_blank">Stamen Design</a> &copy; OpenStreetMap'}).addTo(map);
    document.getElementById("trip-plan").addEventListener("click", planTrip);
    fetch("data/events.json").then(function(r){return r.json();}).then(function(d){
      allEvents=(d.events||[]).filter(function(e){ return e&&e.id&&e.source!=="sample"; });
      showBaseEvents(allEvents);  // show every event on the map straight away
    }).catch(function(){ document.getElementById("trip-status").textContent="Couldn't load events."; });
  })();
  </script>
</body>
</html>
