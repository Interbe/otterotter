# Netlify configuration for Otterotter
#
# Static site — no build step. The "ignore" command below tells Netlify to SKIP a
# deploy unless one of the real site files changed. The Telegram pipeline often
# commits only its bookkeeping (pipeline/state.json, geocode_cache.json); those
# commits no longer trigger a deploy, which saves credits.
#
# How "ignore" works: exit 0 = skip the build, exit 1 = build.
# `git diff --quiet ... -- <paths>` exits 0 when those paths are unchanged.
#
# We diff against $CACHED_COMMIT_REF (the last commit Netlify actually deployed)
# rather than HEAD^. This is robust across merge commits and previously-skipped
# builds: HEAD^ on a merge commit only shows one parent's diff and can wrongly
# skip real changes. Comparing to the last deployed commit never misses them.

[build]
  publish = "."
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!pipeline/state.json' ':!pipeline/geocode_cache.json'"

[functions]
  directory = "netlify/functions"

# Allow the local location-review tool to fetch the public events data.
[[headers]]
  for = "/data/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
